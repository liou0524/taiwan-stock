name: 每日自動三大法人期貨更新

on:
  schedule:
    # 每天台股期貨收盤盤後（下午 15:15 台灣時間）自動執行
    - cron: '15 7 * * *'
  workflow_dispatch: # 保留手動點擊按鈕的功能

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
    - name: 複製儲存庫檔案
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝核心相容套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: 執行核心爬蟲大腦
      run: python crawler.py

    - name: 強制將新網頁推回 GitHub 伺服器
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 機器人防白屏自動網頁覆蓋更新" && git push)
