<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三大法人期貨未平倉觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col items-center justify-start italic-none">

    <div class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-6 my-6">
        <div class="border-b border-slate-800 pb-4 mb-6">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 via-teal-400 to-amber-400 bg-clip-text text-transparent">
                📊 三大法人台指期貨留倉觀測站
            </h1>
            <p class="text-xs text-slate-400 mt-1">最後更新時間：<span id="update-date">讀取中...</span> (每日 15:10 自動更新)</p>
        </div>

        <div class="overflow-x-auto mb-8 rounded-xl border border-slate-800 bg-slate-900/50">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-slate-300 text-sm">
                        <th class="p-4">法人項目</th>
                        <th class="p-4">多方留倉 (口)</th>
                        <th class="p-4">空方留倉 (口)</th>
                        <th class="p-4">淨部位 (口)</th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-slate-800">
                    <tr class="hover:bg-slate-800/30">
                        <td class="p-4 font-semibold text-amber-400">外資及陸資</td>
                        <td id="foreign-long" class="p-4">--</td>
                        <td id="foreign-short" class="p-4">--</td>
                        <td id="foreign-net" class="p-4 font-bold">--</td>
                    </tr>
                    <tr class="hover:bg-slate-800/30">
                        <td class="p-4 font-semibold text-blue-400">投信</td>
                        <td id="sitc-long" class="p-4">--</td>
                        <td id="sitc-short" class="p-4">--</td>
                        <td id="sitc-net" class="p-4 font-bold">--</td>
                    </tr>
                    <tr class="hover:bg-slate-800/30">
                        <td class="p-4 font-semibold text-teal-400">自營商</td>
                        <td id="dealers-long" class="p-4">--</td>
                        <td id="dealers-short" class="p-4">--</td>
                        <td id="dealers-net" class="p-4 font-bold">--</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="bg-slate-900/30 border border-slate-800 p-4 rounded-xl">
            <h3 class="text-sm font-semibold text-slate-300 mb-4">📈 三大法人淨部位歷史趨勢</h3>
            <div class="h-80 w-full">
                <canvas id="trendsChart"></canvas>
            </div>
        </div>
    </div>

    <script id="data-script">
        const rawData = [{"date": "2026/05/28", "foreign": {"long": 16585, "short": 74781, "net": -58196}, "sitc": {"long": 25410, "short": 12450, "net": 12960}, "dealers": {"long": 8420, "short": 9150, "net": -730}}]; // 初始空陣列，爬蟲會把資料填在這裡
    </script>

    <script>
        // 渲染網頁與圖表的邏輯
        if (rawData.length > 0) {
            const latest = rawData[rawData.length - 1];
            document.getElementById('update-date').innerText = latest.date;
            
            // 填入表格數據
            const fillRow = (prefix, data) => {
                document.getElementById(`${prefix}-long`).innerText = data.long.toLocaleString();
                document.getElementById(`${prefix}-short`).innerText = data.short.toLocaleString();
                const net = data.net;
                const netEl = document.getElementById(`${prefix}-net`);
                netEl.innerText = net.toLocaleString();
                netEl.className = net >= 0 ? "p-4 font-bold text-rose-500" : "p-4 font-bold text-emerald-500";
            };
            
            fillRow('foreign', latest.foreign);
            fillRow('sitc', latest.sitc);
            fillRow('dealers', latest.dealers);

            // 準備圖表數據
            const dates = rawData.map(d => d.date.substring(5)); // 只取月/日
            const foreignNets = rawData.map(d => d.foreign.net);
            const sitcNets = rawData.map(d => d.sitc.net);
            const dealersNets = rawData.map(d => d.dealers.net);

            const ctx = document.getElementById('trendsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        { label: '外資淨額', data: foreignNets, borderColor: '#f59e0b', borderWidth: 2, tension: 0.2 },
                        { label: '投信淨額', data: sitcNets, borderColor: '#60a5fa', borderWidth: 2, tension: 0.2 },
                        { label: '自營商淨額', data: '#2dd4bf', borderColor: '#2dd4bf', borderWidth: 2, tension: 0.2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        } else {
            document.getElementById('update-date').innerText = "暫無數據，等待首度自動更新...";
        }
    </script>
</body>
</html>
