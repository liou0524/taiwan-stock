</script>

    <script>
        if (rawData.length > 0) {
            const latest = rawData[rawData.length - 1];
            document.getElementById('update-date').innerText = latest.date + " 15:10 (自動同步)";
            
            const fillRow = (prefix, data) => {
                document.getElementById(`${prefix}-long`).innerText = data.long.toLocaleString();
                document.getElementById(`${prefix}-short`).innerText = data.short.toLocaleString();
                const net = data.net;
                const netEl = document.getElementById(`${prefix}-net`);
                netEl.innerText = (net > 0 ? "+" : "") + net.toLocaleString();
                
                // 科技感配色：正數用科技紅(偏粉紅爆發)，負數用螢光綠
                if(net >= 0) {
                    netEl.className = "p-4 text-right font-black text-base text-rose-500";
                } else {
                    netEl.className = "p-4 text-right font-black text-base text-emerald-400";
                }
            };
            
            fillRow('foreign', latest.foreign);
            fillRow('sitc', latest.sitc);
            fillRow('dealers', latest.dealers);

            // 圖表渲染
            const dates = rawData.map(d => d.date.substring(5)); // 格式化成 05/28
            const foreignNets = rawData.map(d => d.foreign.net);
            const sitcNets = rawData.map(d => d.sitc.net);
            const dealersNets = rawData.map(d => d.dealers.net);

            const ctx = document.getElementById('trendsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        { label: '外資淨額', data: foreignNets, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.03)', borderWidth: 3, pointRadius: dates.length > 15 ? 1 : 3, tension: 0.2, fill: true },
                        { label: '投信淨額', data: sitcNets, borderColor: '#3b82f6', borderWidth: 2, pointRadius: dates.length > 15 ? 1 : 3, tension: 0.2 },
                        { label: '自營商淨額', data: dealersNets, borderColor: '#10b981', borderWidth: 2, pointRadius: dates.length > 15 ? 1 : 3, tension: 0.2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { color: '#94a3b8', font: { family: 'monospace', size: 11 } } } 
                    },
                    scales: {
                        x: { grid: { color: 'rgba(51, 65, 85, 0.3)' }, ticks: { color: '#64748b', font: { family: 'monospace' } } },
                        y: { grid: { color: 'rgba(51, 65, 85, 0.3)' }, ticks: { color: '#64748b', font: { family: 'monospace' } } }
                    }
